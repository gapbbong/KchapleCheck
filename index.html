<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경성전자고 예배 출석 체크</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
</head>
<body>

<!-- ===== 스플래시 화면 ===== -->
<div id="splash" class="splash hidden">
  <div class="splash-inner">
    <img src="logo.png" alt="경성전자고" class="splash-logo" />
    <div class="splash-name">경성전자고등학교</div>
    <div class="splash-sub">예배 출석 체크</div>
    <div class="splash-spinner"><div class="spinner"></div></div>
  </div>
</div>

<!-- ===== 메인 화면 ===== -->
<div id="app" class="screen active">

  <!-- 헤더 -->
  <header class="app-header">
    <div class="header-left">
      <span class="school-badge">
        <div class="cross-icon"></div>
      </span>
      <div>
        <div class="school-name">경성전자고등학교</div>
        <div class="event-name">예배 출석 체크</div>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="statsBtn" title="출석 통계">
        <span class="material-icons-round">bar_chart</span>
      </button>
      <div class="settings-wrap">
        <button class="icon-btn" id="settingsBtn" title="설정">
          <span class="material-icons-round">settings</span>
        </button>
        <div class="app-version">v2.4</div>
      </div>
    </div>
  </header>

  <!-- 입력 영역 -->
  <div class="input-area">
    <!-- 날짜 표시 (요일 포함) -->
    <div class="date-display" id="dateDisplay"></div>
    
    <!-- 모드 전환 탭 (v2.6) -->
    <div class="mode-tabs">
      <div id="modeTabBg" class="mode-tab-bg"></div>
      <button class="mode-tab active" data-mode="chapel">예배 출석</button>
      <button class="mode-tab" data-mode="1on1">1:1 제자훈련</button>
    </div>

    <!-- 제자훈련시 양육자 입력 (v2.7) -->
    <div id="mentorInputMainBox" class="mentor-main-box hidden">
      <span class="material-icons-round">edit_note</span>
      <input type="text" id="mentorNameMain" class="mentor-main-input" placeholder="양육자 성함을 입력해 주세요">
    </div>
    
    <div class="id-display" id="idDisplay">
      <span id="idText" class="id-placeholder">학번 입력</span>
    </div>
    <!-- 결과 표시 -->
    <div class="result-badge" id="resultBadge"></div>
  </div>

  <!-- 숫자 키패드 -->
  <div class="keypad">
    <button class="key" data-val="1">1</button>
    <button class="key" data-val="2">2</button>
    <button class="key" data-val="3">3</button>
    <button class="key" data-val="4">4</button>
    <button class="key" data-val="5">5</button>
    <button class="key" data-val="6">6</button>
    <button class="key" data-val="7">7</button>
    <button class="key" data-val="8">8</button>
    <button class="key" data-val="9">9</button>
    <button class="key key-clear" id="clearBtn">
      <span class="material-icons-round">backspace</span>
    </button>
    <button class="key" data-val="0">0</button>
    <button class="key key-submit" id="submitBtn">
      <span class="material-icons-round">check_circle</span>
    </button>
  </div>

</div>

<!-- ===== 통계 화면 ===== -->
<div id="statsScreen" class="screen">
  <header class="app-header sub">
    <button class="icon-btn back-btn" id="statsBack">
      <span class="material-icons-round">arrow_back_ios_new</span>
    </button>
    <div class="screen-title">출석 통계</div>
    <button class="icon-btn" id="refreshStats">
      <span class="material-icons-round">refresh</span>
    </button>
  </header>

    <div class="stats-content">
      <!-- 예배 참석자 수 버튼 추가 -->
      <div class="stats-action-bar">
        <button class="action-btn" id="showDailyStats">
          <span class="material-icons-round">calendar_month</span>
          날짜별 참석자 수
        </button>
      </div>

      <!-- 날짜별 통계 목록 (평상시 숨김) -->
      <div id="dailyStatsPanel" class="daily-stats-panel hidden">
        <div class="daily-stats-header">
          <span>날짜</span>
          <span>인원</span>
        </div>
        <div id="dailyStatsList" class="daily-stats-list"></div>
      </div>

      <div class="stats-summary-row">
      <div class="stat-card">
        <div class="stat-num" id="totalToday">-</div>
        <div class="stat-label">오늘 출석</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-num" id="snackCount">-</div>
        <div class="stat-label">🍬 간식 대상</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="targetCount">-</div>
        <div class="stat-label">기준 횟수</div>
      </div>
    </div>

    <!-- 필터 탭 -->
    <div class="stats-tabs">
      <button class="tab-btn active" data-tab="pending">간식 대기 (<span id="pendingCount">0</span>)</button>
      <button class="tab-btn" data-tab="received">수령 완료 (<span id="receivedCount">0</span>)</button>
      <button class="tab-btn" data-tab="all">전체 기록</button>
    </div>

    <!-- 간식 대상자 및 기록 목록 -->
    <div id="statsListContainer">
      <div id="snackList" class="snack-list">
        <div class="loading-spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 설정 화면 ===== -->
<div id="settingsScreen" class="screen">
  <header class="app-header sub">
    <button class="icon-btn back-btn" id="settingsBack">
      <span class="material-icons-round">arrow_back_ios_new</span>
    </button>
    <div class="screen-title">설정</div>
    <div></div>
  </header>

  <div class="settings-content">
    <div class="settings-card">


      <div class="settings-item">
        <div class="settings-label">
          <span class="material-icons-round">cake</span>
          간식 지급 기준 횟수
        </div>
        <div class="counter-row">
          <button class="counter-btn" id="decreaseThreshold">−</button>
          <span class="counter-val" id="thresholdVal">3</span>
          <button class="counter-btn" id="increaseThreshold">+</button>
        </div>
      </div>

      <button class="save-btn" id="saveSettings">
        <span class="material-icons-round">save</span>
        저장
      </button>
    </div>

    <div class="settings-card danger-zone">
      <div class="settings-label" style="color:#ef4444">
        <span class="material-icons-round" style="color:#ef4444">warning</span>
        위험 구역
      </div>
      <button class="danger-btn" id="clearTodayLocal">오늘 로컬 기록 초기화</button>
    </div>
  </div>
</div>

<!-- ===== 전역 오버레이 (성공/실패 팝업) ===== -->
<div id="overlay" class="overlay hidden">
  <div class="overlay-card" id="overlayCard">
    <div class="overlay-icon" id="overlayIcon"></div>
    <div class="overlay-name" id="overlayName"></div>
    <div class="overlay-sub" id="overlaySub"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  // 세션 첫 방문 시에만 스플래시 표시
  const splash = document.getElementById('splash');
  if (!sessionStorage.getItem('splashShown')) {
    splash.classList.remove('hidden');
    splash.classList.add('show');
    sessionStorage.setItem('splashShown', '1');
    setTimeout(() => {
      splash.classList.add('fade-out');
      setTimeout(() => splash.classList.add('hidden'), 500);
    }, 1600);
  }
</script>
</body>
</html>
